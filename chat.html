<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交渉チャットルーム - BRAINROT TRADE</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0b0e;
            color: #f3f4f6;
            margin: 0;
            padding: 20px;
        }
        .chat-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #15151a;
            border: 1px solid #262630;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            height: 85vh;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .chat-header {
            padding: 15px;
            border-bottom: 1px solid #262630;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header h3 { margin: 0; color: #00e5ff; }
        .btn-back {
            background: none;
            border: 1px solid #4b5563;
            color: #9ca3af;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-back:hover { background-color: #262630; color: white; }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.95em;
            line-height: 1.4;
            word-break: break-all;
        }
        .msg.received {
            background-color: #262630;
            color: #f3f4f6;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .msg.sent {
            background: linear-gradient(135deg, #00e5ff 0%, #00a8ff 100%);
            color: #050508;
            font-weight: 500;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .msg-sender {
            font-size: 0.75em;
            color: #9ca3af;
            margin-bottom: 3px;
            display: block;
        }

        .chat-input-area {
            padding: 15px;
            border-top: 1px solid #262630;
            display: flex;
            gap: 10px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #2d2d3d;
            background-color: #1c1c24;
            color: white;
            font-size: 1em;
        }
        .chat-input-area input:focus { border-color: #00e5ff; outline: none; }
        .btn-send {
            background-color: #00e5ff;
            color: #050508;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-send:hover { background-color: #00a8ff; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <button class="btn-back" onclick="location.href='index.html'">◀ 戻る</button>
        <h3 id="roomTitle">トレード交渉ルーム</h3>
        <span style="font-size: 0.8em; color: #10b981;">● Online</span>
    </div>

    <!-- チャット表示エリア -->
    <div class="chat-messages" id="chatMessages">
        <div class="msg received">
            <span class="msg-sender">システム</span>
            トレード専用チャットへようこそ！詐欺や現金取引に注意し、ロビーID等を交換して交渉を進めてください。
        </div>
    </div>

    <!-- メッセージ送信エリア -->
    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="メッセージを入力..." onkeypress="handleKey(event)">
        <button class="btn-send" onclick="sendMessage()">送信</button>
    </div>
</div>

<script>
    // URLからルームIDを取得
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room') || 'default_room';
    document.getElementById('roomTitle').innerText = `交渉 (${roomId})`;

    // ローカルストレージを擬似データベースとして使用
    const storageKey = `chat_history_${roomId}`;

    window.onload = function() {
        loadMessages();
        // 1秒ごとにメッセージを自動リフレッシュ（擬似リアルタイム）
        setInterval(loadMessages, 1000);
    };

    function loadMessages() {
        const messages = JSON.parse(localStorage.getItem(storageKey)) || [];
        const chatMessages = document.getElementById('chatMessages');
        
        // 初期のシステム案内を残してクリア
        chatMessages.innerHTML = `
            <div class="msg received">
                <span class="msg-sender">システム</span>
                トレード専用チャットへようこそ！詐欺や現金取引に注意し、ロビーID等を交換して交渉を進めてください。
            </div>
        `;

        messages.forEach(msg => {
            const msgDiv = document.createElement('div');
            // 本来はユーザーの識別が必要。簡易的に自分のメッセージと相手のメッセージを区別
            msgDiv.className = `msg ${msg.isMe ? 'sent' : 'received'}`;
            msgDiv.innerHTML = `<span class="msg-sender">${escapeHTML(msg.sender)}</span>${escapeHTML(msg.text)}`;
            chatMessages.appendChild(msgDiv);
        });
    }

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        const messages = JSON.parse(localStorage.getItem(storageKey)) || [];
        
        // 新しいメッセージオブジェクトを追加
        messages.push({
            sender: "あなた",
            text: text,
            isMe: true // 自分が送ったメッセージ
        });

        localStorage.setItem(storageKey, JSON.stringify(messages));
        input.value = '';
        loadMessages();

        // 一番下までスクロール
        const chatMessages = document.getElementById('chatMessages');
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function handleKey(e) {
        if (e.key === 'Enter') sendMessage();
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, match => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' }[match]));
    }
</script>
</body>
</html>
